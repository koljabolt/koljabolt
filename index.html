<html>
  <head>
    <title>Kolja HTML website</title>
    <meta charset="UTF-8">
    <meta name="description" content="Artist/Animator portfolio webpage">
    <meta name="keywords" content="HTML, CSS">
    <meta name="author" content="Kolja Boldyrev">
  </head>
  <!--link rel="stylesheet" href="style.css"-->
  <style>
    body{
    background: #dde1e5;
    background-image: url("images/bg text 01.png");
    }

    h1 {
        color:  salmon;
        font-family: "Helvetica Neue", sans-serif;
        font-size: 40px;
    }

    h2 {
        color: olive;
        font-family: "Helvetica Neue Light", sans-serif;
        font-size: 15px;
        text-align: center;
        outline-style: none;
        padding: 2px;
    }
    .griddy {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 1px;
      padding: 20%;
      border: 1px;
      grid-template-areas: 
        "topcenter topcenter topcenter"
        "bottomleft bottomcenter bottomright"
        "midcenter midcenter midcenter";
    }
    .griddy div {
      padding: 10px;
    }
    .griddy div.topcenter {
      grid-area: topcenter;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .griddy div.bottomleft {
      grid-area: bottomleft;
      text-align: center;
      height: auto;
    }
    .griddy div.bottomcenter {
      grid-area: bottomcenter;
      text-align: center;
      height: auto;
    }
    .griddy div.bottomright {
      grid-area: bottomright;
      text-align: center;
      height: auto;
    }    
    .griddy div.midcenter {
      grid-area: midcenter;
      align-self: center;
      justify-self: center;
      padding: 20%;
    }
    .footer {
      text-align: center;
      font-family: Helvetica, sans-serif;
      font-size: 10 px;
      padding-bottom: 5%;
    }
    img {
      max-width: 100%;
      height: auto;
    }
  </style>
  <body>
    <div class="griddy">
      <div class="topcenter">
        <h1>KOLJA
        <img src="images/logo.webp" alt="logo">
        BOLDYREV
        </h1>
      </div>
      <div class="bottomleft">
        <h2> Digital Art 
        </h2>
      </div>
      <div class="bottomcenter">
        <h2> Animation </h2>
      </div>
      <div class="bottomright">
        <h2> Storytelling</h2>
      </div>
      <div class="midcenter">
        <a href="art.html"><img src="images/art.png" alt="artwork"></a>
        <a href="prj.html"><img src="images/prj.png" alt="projects"></a>
      </div>
    </div>
    <div class="footer">
      <p>© 2024 Kolja Boldyrev. All rights reserved.</p>
    </div>
  </body>
</html>
